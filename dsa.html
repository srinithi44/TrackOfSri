<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSA Tracker | PlacementOS</title>
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .dsa-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }
    
    .filters-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      background: var(--bg-secondary);
      padding: 1rem;
      border-radius: var(--border-radius-sm);
      border: 1px solid var(--border-color);
    }
    
    .topic-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    .topic-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-md);
      overflow: hidden;
    }
    
    .topic-header {
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      background: rgba(0,0,0,0.1);
      transition: background var(--transition-fast);
    }
    
    .topic-header:hover {
      background: rgba(0,0,0,0.2);
    }
    
    [data-theme="beige"] .topic-header {
      background: rgba(0,0,0,0.02);
    }
    [data-theme="beige"] .topic-header:hover {
      background: rgba(0,0,0,0.05);
    }
    
    .topic-title-group {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    
    .topic-title {
      font-size: 1.25rem;
      font-weight: 600;
    }
    
    .problems-container {
      display: none;
      padding: 0 1.5rem 1.5rem 1.5rem;
    }
    
    .problems-container.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }
    
    .problems-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    
    .problems-table th, .problems-table td {
      padding: 0.75rem;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }
    
    .problems-table th {
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 0.85rem;
    }
    
    .diff-easy { color: var(--success); }
    .diff-medium { color: var(--warning); }
    .diff-hard { color: var(--danger); }
    
    .status-select {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.25rem;
      border-radius: var(--border-radius-sm);
    }
    
    .status-select option {
      background: var(--bg-primary);
    }
    
    .table-notes-input {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      width: 100%;
    }
    
    .table-notes-input:focus {
      outline: none;
      color: var(--text-primary);
      border-bottom: 1px solid var(--primary);
    }
    
    @media (max-width: 768px) {
      .filters-bar { flex-direction: column; }
      .problems-table { display: block; overflow-x: auto; white-space: nowrap; }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <aside class="sidebar glass-panel" id="sidebar">
      <div class="brand">
        <div class="brand-icon">P</div>
        <h2 class="text-gradient">PlacementOS</h2>
      </div>
      <ul class="nav-links">
        <li><a href="dashboard.html" class="nav-item">📊 Dashboard</a></li>
        <li><a href="planner.html" class="nav-item">📅 Daily Planner</a></li>
        <li><a href="dsa.html" class="nav-item active">💻 DSA Tracker</a></li>
        <li><a href="aptitude.html" class="nav-item">🧠 Aptitude</a></li>
        <li><a href="communication.html" class="nav-item">🗣️ Communication</a></li>
        <li><a href="companies.html" class="nav-item">🏢 Companies</a></li>
        <li><a href="mock-tests.html" class="nav-item">📝 Mock Tests</a></li>
        <li><a href="analytics.html" class="nav-item">📈 Analytics</a></li>
        <li><a href="achievements.html" class="nav-item">🏆 Achievements</a></li>
        <li><a href="settings.html" class="nav-item">⚙️ Settings</a></li>
      </ul>
    </aside>

    <main class="main-content">
      <header class="topbar glass-panel">
        <div style="display: flex; align-items: center; gap: 1rem;">
          <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
        </div>
        <div class="topbar-actions">
          <span class="text-muted" id="current-date"></span>
          <button class="btn-icon" id="theme-toggle-btn">☀️</button>
          <div class="profile-btn"><div class="profile-avatar">S</div></div>
        </div>
      </header>

      <div class="page-content animate-fade-in">
        <div class="dsa-header">
          <div>
            <h1 class="text-gradient">DSA Tracker</h1>
            <p class="text-muted">Master data structures and algorithms.</p>
          </div>
          <div style="text-align: right;">
            <div class="text-muted" style="font-size: 0.85rem;">Overall Progress</div>
            <div style="font-size: 1.5rem; font-weight: bold; color: var(--primary);" id="total-progress-text">0%</div>
          </div>
        </div>
        
        <div class="filters-bar animate-slide-up stagger-1">
          <input type="text" id="search-input" class="input-control" placeholder="Search problems..." style="flex: 2;">
          <select id="difficulty-filter" class="input-control" style="flex: 1;">
            <option value="All">All Difficulties</option>
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
          </select>
          <select id="status-filter" class="input-control" style="flex: 1;">
            <option value="All">All Status</option>
            <option value="Todo">Todo</option>
            <option value="Attempted">Attempted</option>
            <option value="Solved">Solved</option>
            <option value="Revisit">Revisit</option>
          </select>
          <button id="add-problem-btn" class="btn btn-primary">Add Problem</button>
        </div>

        <div id="add-problem-form" class="filters-bar animate-slide-up stagger-1" style="display: none; flex-wrap: wrap; gap: 1rem;">
           <input type="text" id="new-prob-name" class="input-control" placeholder="Problem Name" style="flex: 2; min-width: 200px;">
           <input type="text" id="new-prob-id" class="input-control" placeholder="ID (e.g. 101)" style="flex: 1; min-width: 80px;">
           <input type="text" id="new-prob-pattern" class="input-control" placeholder="Pattern (e.g. Array)" style="flex: 1; min-width: 150px;">
           <select id="new-prob-diff" class="input-control" style="flex: 1; min-width: 100px;">
             <option value="Easy">Easy</option>
             <option value="Medium">Medium</option>
             <option value="Hard">Hard</option>
           </select>
           <select id="new-prob-topic" class="input-control" style="flex: 1.5; min-width: 150px;">
             <!-- populated by JS -->
           </select>
           <button id="save-new-prob-btn" class="btn btn-primary">Save</button>
           <button id="cancel-new-prob-btn" class="btn btn-outline">Cancel</button>
        </div>

        <div class="topic-list animate-slide-up stagger-2" id="topic-list">
          <!-- Topics injected via JS -->
        </div>
      </div>
    </main>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dsa.js"></script>
  <script>
    document.getElementById('current-date').textContent = new Date().toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  </script>
</body>
</html>
