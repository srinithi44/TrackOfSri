<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Tracker | PlacementOS</title>
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .company-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    
    .company-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-md);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    .company-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .company-name {
      font-size: 1.25rem;
      font-weight: 600;
    }
    
    .pipeline {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    
    .pipeline-stage {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem;
      background: var(--bg-primary);
      border-radius: var(--border-radius-sm);
      font-size: 0.9rem;
    }
    
    .status-select {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.2rem;
      border-radius: var(--border-radius-sm);
      font-size: 0.8rem;
    }
    
    .status-select option {
      background: var(--bg-primary);
    }
    
    .company-notes {
      width: 100%;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.5rem;
      border-radius: var(--border-radius-sm);
      min-height: 60px;
      resize: vertical;
      font-size: 0.85rem;
    }
    
    .status-badge {
      padding: 0.2rem 0.5rem;
      border-radius: var(--border-radius-sm);
      font-size: 0.75rem;
      font-weight: 600;
    }
    
    .status-pending { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
    .status-cleared { background: rgba(34, 197, 94, 0.1); color: var(--success); }
    .status-rejected { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
  </style>
</head>
<body>

  <div class="app-container">
    <aside class="sidebar glass-panel" id="sidebar">
      <div class="brand">
        <div class="brand-icon">P</div>
        <h2 class="text-gradient">PlacementOS</h2>
      </div>
      <ul class="nav-links">
        <li><a href="dashboard.html" class="nav-item">📊 Dashboard</a></li>
        <li><a href="planner.html" class="nav-item">📅 Daily Planner</a></li>
        <li><a href="dsa.html" class="nav-item">💻 DSA Tracker</a></li>
        <li><a href="aptitude.html" class="nav-item">🧠 Aptitude</a></li>
        <li><a href="communication.html" class="nav-item">🗣️ Communication</a></li>
        <li><a href="companies.html" class="nav-item active">🏢 Companies</a></li>
        <li><a href="mock-tests.html" class="nav-item">📝 Mock Tests</a></li>
        <li><a href="analytics.html" class="nav-item">📈 Analytics</a></li>
        <li><a href="achievements.html" class="nav-item">🏆 Achievements</a></li>
        <li><a href="settings.html" class="nav-item">⚙️ Settings</a></li>
      </ul>
    </aside>

    <main class="main-content">
      <header class="topbar glass-panel">
        <div style="display: flex; align-items: center; gap: 1rem;">
          <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
        </div>
        <div class="topbar-actions">
          <span class="text-muted" id="current-date"></span>
          <button class="btn-icon" id="theme-toggle-btn">☀️</button>
          <div class="profile-btn"><div class="profile-avatar">S</div></div>
        </div>
      </header>

      <div class="page-content animate-fade-in">
        <div style="margin-bottom: 2rem;">
          <h1 class="text-gradient">Company Tracker</h1>
          <p class="text-muted">Track your application pipeline.</p>
        </div>
        
        <div class="company-grid animate-slide-up stagger-1" id="company-grid">
          <!-- Injected via JS -->
        </div>
      </div>
    </main>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/companies.js"></script>
  <script>
    document.getElementById('current-date').textContent = new Date().toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  </script>
</body>
</html>
